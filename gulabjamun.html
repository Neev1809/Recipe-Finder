<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recipe Finder</title>
    <link rel="stylesheet" href="spanakopita.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Lato:wght@400&display=swap" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400&display=swap" rel="stylesheet">
</head>
<body>
    <nav>
        <div class="logo">
            <img src="Logo.jpg" alt="Logo">
            <b>Recipe Finder</b>
        </div>
       <div class="SearchBox">
            <i class="fa-solid fa-magnifying-glass"></i>
            <input type="text" name="Search Bar" placeholder="Search for recipe">
        </div>

        <div class="links">
            <a href="index.html">Home</a>
            <a href="#about">About</a>
            <a href="#contact">Contact</a>
            <a href="login.html">
                <img src="user.png" alt="User">
            </a>
        </div>
    </nav>

    <div class="container">
        <div class="buttons">
            <div class="left-cards">
                <button class="recipe-card-main">
                    <div class="card-top">
                        <div class="left">
                            <img src="gulab.jpg" alt="Gulab Jamun">
                        </div>
                        <div class="right">
                            <div class="header">
                                <h3>INDIAN DESSERT</h3>
                                <h3>VEG</h3>
                            </div>
                            <h1>Gulab Jamun</h1>
                            <div class="divider-first"></div>
                            <p>Soft milk-solid dumplings fried to golden perfection and soaked in a warm, fragrant rose-cardamom sugar syrup. India's most cherished sweet!</p>
                            <div class="divider-second"></div>
                            <div class="details">
                                <div class="detail">
                                    <span class="detail-label"><i class="fa-solid fa-clock" style="color: darkgreen;"></i> Time</span>
                                    <span class="detail-value">45 mins</span>
                                </div>
                                <div class="divider-third"></div>
                                <div class="detail">
                                    <span class="detail-label"><i class="fa-solid fa-star" style="color: darkgreen;"></i> Rating</span>
                                    <span class="detail-value">4.9/5</span>
                                </div>
                                <div class="divider-third"></div>
                                <div class="detail">
                                    <span class="detail-label"><i class="fa-solid fa-fire" style="color: darkgreen;"></i> Calories</span>
                                    <span class="detail-value">310 kcal</span>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="divider-fourth"></div>
                    <div class="about-recipe">
                        <h2>About This Recipe</h2>
                        <br>
                        <div class="divider-fifth"></div>
                        <p>
                            Gulab Jamun is one of India's most iconic and beloved desserts, served at weddings, festivals, and
                            celebrations across the country. Made from khoya (reduced milk solids) mixed with a little flour,
                            shaped into smooth balls, and deep-fried until golden brown, they are then soaked in a fragrant
                            sugar syrup infused with cardamom, rose water, and saffron.

                            Served warm or at room temperature, these melt-in-your-mouth dumplings are the very essence of
                            Indian festive cooking. Their syrup-soaked softness and floral aroma make them simply unforgettable.
                        </p>
                    </div>
                </button>

                <button class="steps">
                    <h1><i class="fa-solid fa-utensils"></i> Step-by-Step Instructions</h1>
                    <div class="divider-steps"></div>
                    <div class="each-step">
                        <div class="step-number"><h2>1.</h2></div>
                        <div class="step-content"><p>Prepare the sugar syrup: dissolve sugar in water over medium heat, add cardamom pods, rose water, and a few saffron strands. Simmer for 5 minutes until slightly sticky. Keep warm.</p></div>
                    </div>
                    <div class="step-divider"></div>
                    <div class="each-step">
                        <div class="step-number"><h2>2.</h2></div>
                        <div class="step-content"><p>In a bowl, combine khoya, all-purpose flour, a pinch of baking soda, and a little milk. Knead gently into a smooth, soft dough — do not over-knead.</p></div>
                    </div>
                    <div class="step-divider"></div>
                    <div class="each-step">
                        <div class="step-number"><h2>3.</h2></div>
                        <div class="step-content"><p>Divide the dough into small equal portions and roll each into a smooth ball without any cracks on the surface.</p></div>
                    </div>
                    <div class="step-divider"></div>
                    <div class="each-step">
                        <div class="step-number"><h2>4.</h2></div>
                        <div class="step-content"><p>Heat oil or ghee in a deep pan over low to medium heat. Fry the dough balls in batches, stirring gently, until evenly golden brown all over (about 8–10 minutes).</p></div>
                    </div>
                    <div class="step-divider"></div>
                    <div class="each-step">
                        <div class="step-number"><h2>5.</h2></div>
                        <div class="step-content"><p>Remove the fried balls and immediately transfer them into the warm sugar syrup. Let them soak for at least 30 minutes.</p></div>
                    </div>
                    <div class="step-divider"></div>
                    <div class="each-step">
                        <div class="step-number"><h2>6.</h2></div>
                        <div class="step-content"><p>Serve warm or at room temperature, garnished with chopped pistachios or rose petals. They taste even better the next day!</p></div>
                    </div>
                </button>
            </div>

            <div class="right-cards">
                <button class="recipe-card-ingredients">
                    <h1><i class="fa-solid fa-scroll"></i> Ingredients</h1>
                    <div class="divider-ingredients-first"></div>
                    <h3>For the Dumplings</h3>
                    <ul>
                        <li>Khoya (Mawa)</li>
                        <li>All-Purpose Flour</li>
                        <li>Baking Soda</li>
                        <li>Milk (as needed)</li>
                        <li>Ghee or Oil (for frying)</li>
                    </ul>
                    <div class="divider-ingredients-second"></div>
                    <h3>For the Sugar Syrup</h3>
                    <ul>
                        <li>Sugar</li>
                        <li>Water</li>
                        <li>Cardamom Pods</li>
                        <li>Rose Water</li>
                        <li>Saffron Strands</li>
                    </ul>
                </button>

                <button class="nutrition">
                    <div class="nutrition-header">
                        <h1><i class="fa-solid fa-heart-pulse"></i> Nutrition <span class="per-serving">(per 100g)</span></h1>
                    </div>
                    <div class="divider-nutrition-first"></div>
                    <div class="nutrition-row"><span class="nutrition-label">Calories</span><span class="nutrition-value">310 kcal</span></div>
                    <div class="divider-nutrition"></div>
                    <div class="nutrition-row"><span class="nutrition-label">Total Fat</span><span class="nutrition-value">10 g</span></div>
                    <div class="divider-nutrition"></div>
                    <div class="nutrition-row"><span class="nutrition-label">Carbs</span><span class="nutrition-value">50 g</span></div>
                    <div class="divider-nutrition"></div>
                    <div class="nutrition-row"><span class="nutrition-label">Protein</span><span class="nutrition-value">6 g</span></div>
                    <div class="divider-nutrition"></div>
                    <div class="nutrition-row"><span class="nutrition-label">Sodium</span><span class="nutrition-value">80 mg</span></div>
                    <div class="divider-nutrition"></div>
                    <div class="nutrition-row"><span class="nutrition-label">Cholesterol</span><span class="nutrition-value">20 mg</span></div>
                    <div class="divider-nutrition"></div>
                    <div class="nutrition-row"><span class="nutrition-label">Potassium</span><span class="nutrition-value">175 mg</span></div>
                </button>
            </div>
        </div>
    </div>
</body>
</html>
