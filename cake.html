<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recipe Finder</title>
    <link rel="stylesheet" href="spanakopita.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Lato:wght@400&display=swap" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400&display=swap" rel="stylesheet">
</head>
<body>
    <nav>
        <div class="logo">
            <img src="Logo.jpeg" alt="Logo">
            <b>Recipe Finder</b>
        </div>
   <div class="SearchBox">
            <i class="fa-solid fa-magnifying-glass"></i>
            <input type="text" name="Search Bar" placeholder="Search for recipe">
        </div>

        <div class="links">
            <a href="#home">Home</a>
            <a href="#about">About</a>
            <a href="#contact">Contact</a>
            <a href="login.html">
                <img src="user.png" alt="User">
            </a>
        </div>
    </nav>

    <div class="container">
        <div class="buttons">
            <div class="left-cards">
                <button class="recipe-card-main">
                    <div class="card-top">
                        <div class="left">
                            <img src="cake.jpg" alt="Chocolate Cake">
                        </div>
                        <div class="right">
                            <div class="header">
                                <h3>DESSERT</h3>
                                <h3>VEG</h3>
                            </div>
                            <h1>Chocolate Cake</h1>
                            <div class="divider-first"></div>
                            <p>A rich and moist chocolate cake layered with smooth chocolate frosting. Perfect for celebrations and every sweet craving!</p>
                            <div class="divider-second"></div>
                            <div class="details">
                                <div class="detail">
                                    <span class="detail-label"><i class="fa-solid fa-clock" style="color: darkgreen;"></i> Time</span>
                                    <span class="detail-value">60 mins</span>
                                </div>
                                <div class="divider-third"></div>
                                <div class="detail">
                                    <span class="detail-label"><i class="fa-solid fa-star" style="color: darkgreen;"></i> Rating</span>
                                    <span class="detail-value">4.8/5</span>
                                </div>
                                <div class="divider-third"></div>
                                <div class="detail">
                                    <span class="detail-label"><i class="fa-solid fa-fire" style="color: darkgreen;"></i> Calories</span>
                                    <span class="detail-value">420 kcal</span>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="divider-fourth"></div>
                    <div class="about-recipe">
                        <h2>About This Recipe</h2>
                        <br>
                        <div class="divider-fifth"></div>
                        <p>
                            Chocolate Cake is the king of all desserts — a timeless classic that brings joy to every celebration.
                            Made with rich cocoa, butter, eggs, and flour, the sponge is incredibly moist and deeply chocolatey,
                            while the smooth frosting adds a luscious finishing touch.

                            Whether it's a birthday, anniversary, or simply a weekend treat, a homemade chocolate cake made from
                            scratch always wins hearts. This recipe yields a beautifully soft, layered cake that looks as amazing
                            as it tastes.
                        </p>
                    </div>
                </button>

                <button class="steps">
                    <h1><i class="fa-solid fa-utensils"></i> Step-by-Step Instructions</h1>
                    <div class="divider-steps"></div>
                    <div class="each-step">
                        <div class="step-number"><h2>1.</h2></div>
                        <div class="step-content"><p>Preheat the oven to 180°C (350°F). Grease two 9-inch round cake pans and line the bottoms with parchment paper.</p></div>
                    </div>
                    <div class="step-divider"></div>
                    <div class="each-step">
                        <div class="step-number"><h2>2.</h2></div>
                        <div class="step-content"><p>In a large bowl, whisk together flour, cocoa powder, baking soda, baking powder, salt, and sugar until combined.</p></div>
                    </div>
                    <div class="step-divider"></div>
                    <div class="each-step">
                        <div class="step-number"><h2>3.</h2></div>
                        <div class="step-content"><p>Add eggs, buttermilk, melted butter, and vanilla extract to the dry ingredients. Mix until smooth, then stir in hot water or coffee to thin the batter.</p></div>
                    </div>
                    <div class="step-divider"></div>
                    <div class="each-step">
                        <div class="step-number"><h2>4.</h2></div>
                        <div class="step-content"><p>Divide the batter evenly between the prepared pans and bake for 30–35 minutes, or until a toothpick inserted in the centre comes out clean.</p></div>
                    </div>
                    <div class="step-divider"></div>
                    <div class="each-step">
                        <div class="step-number"><h2>5.</h2></div>
                        <div class="step-content"><p>Let the cakes cool completely in the pans, then turn out onto a wire rack. Meanwhile, prepare the chocolate frosting by beating butter, cocoa, icing sugar, and milk until fluffy.</p></div>
                    </div>
                    <div class="step-divider"></div>
                    <div class="each-step">
                        <div class="step-number"><h2>6.</h2></div>
                        <div class="step-content"><p>Place one cake layer on a plate, spread frosting on top, add the second layer, then frost the top and sides. Decorate as desired and serve.</p></div>
                    </div>
                </button>
            </div>

            <div class="right-cards">
                <button class="recipe-card-ingredients">
                    <h1><i class="fa-solid fa-scroll"></i> Ingredients</h1>
                    <div class="divider-ingredients-first"></div>
                    <h3>For the Cake</h3>
                    <ul>
                        <li>All-Purpose Flour</li>
                        <li>Cocoa Powder</li>
                        <li>Sugar</li>
                        <li>Eggs</li>
                        <li>Butter (melted)</li>
                        <li>Buttermilk</li>
                        <li>Baking Soda & Baking Powder</li>
                        <li>Vanilla Extract</li>
                        <li>Hot Water or Coffee</li>
                    </ul>
                    <div class="divider-ingredients-second"></div>
                    <h3>For the Frosting</h3>
                    <ul>
                        <li>Butter</li>
                        <li>Cocoa Powder</li>
                        <li>Icing Sugar</li>
                        <li>Milk</li>
                        <li>Vanilla Extract</li>
                    </ul>
                </button>

                <button class="nutrition">
                    <div class="nutrition-header">
                        <h1><i class="fa-solid fa-heart-pulse"></i> Nutrition <span class="per-serving">(per 100g)</span></h1>
                    </div>
                    <div class="divider-nutrition-first"></div>
                    <div class="nutrition-row"><span class="nutrition-label">Calories</span><span class="nutrition-value">420 kcal</span></div>
                    <div class="divider-nutrition"></div>
                    <div class="nutrition-row"><span class="nutrition-label">Total Fat</span><span class="nutrition-value">20 g</span></div>
                    <div class="divider-nutrition"></div>
                    <div class="nutrition-row"><span class="nutrition-label">Carbs</span><span class="nutrition-value">58 g</span></div>
                    <div class="divider-nutrition"></div>
                    <div class="nutrition-row"><span class="nutrition-label">Protein</span><span class="nutrition-value">6 g</span></div>
                    <div class="divider-nutrition"></div>
                    <div class="nutrition-row"><span class="nutrition-label">Sodium</span><span class="nutrition-value">230 mg</span></div>
                    <div class="divider-nutrition"></div>
                    <div class="nutrition-row"><span class="nutrition-label">Cholesterol</span><span class="nutrition-value">85 mg</span></div>
                    <div class="divider-nutrition"></div>
                    <div class="nutrition-row"><span class="nutrition-label">Potassium</span><span class="nutrition-value">250 mg</span></div>
                </button>
            </div>
        </div>
    </div>
</body>
</html>
