<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recipe Finder – Blue Lagoon</title>
    <link rel="stylesheet" href="spanakopita.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Lato:wght@400&display=swap" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400&display=swap" rel="stylesheet">
</head>

<body>
    <nav>
        <div class="logo">
            <img src="Logo.jpeg" alt="Logo">
            <b>Recipe Finder</b>
        </div>
        <div class="SearchBox">
            <i class="fa-solid fa-magnifying-glass"></i>
            <input type="text" name="Search Bar" placeholder="Search for recipe">
        </div>

        <div class="links">
            <a href="#home">Home</a>
            <a href="#about">About</a>
            <a href="#contact">Contact</a>
            <a href="login.html">
                <img src="user.png" alt="User">
            </a>
        </div>
    </nav>

    <div class="container">
        <div class="buttons">

            <div class="left-cards">

                <button class="recipe-card-main">

                    <div class="card-top">

                        <div class="left">
                            <img src="blue.jpg" alt="Mashed Potato">
                        </div>

                        <div class="right">

                            <div class="header">
                                <h3>MOCKTAIL</h3>
                                <h3>VEG</h3>
                            </div>

                            <h1>Blue Lagoon</h1>

                            <div class="divider-first"></div>

                            <p>A strikingly vivid sky-blue mocktail with tropical citrus notes. Equal parts show-stopping and delicious — perfect for parties!</p>

                            <div class="divider-second"></div>

                            <div class="details">

                                <div class="detail">
                                    <span class="detail-label">
                                        <i class="fa-solid fa-clock"></i> Time
                                    </span>
                                    <span class="detail-value">5 mins</span>
                                </div>

                                <div class="divider-third"></div>

                                <div class="detail">
                                    <span class="detail-label">
                                        <i class="fa-solid fa-star"></i> Rating
                                    </span>
                                    <span class="detail-value">4.7/5</span>
                                </div>

                                <div class="divider-third"></div>

                                <div class="detail">
                                    <span class="detail-label">
                                        <i class="fa-solid fa-fire"></i> Calories
                                    </span>
                                    <span class="detail-value">110 kcal</span>
                                </div>

                            </div>
                        </div>
                    </div>

                    <div class="divider-fourth"></div>

                    <div class="about-recipe">
                        <h2>About This Recipe</h2>
                        <br>
                        <div class="divider-fifth"></div>

                        <p>
                            The Blue Lagoon gets its iconic colour from blue curacao syrup — a sweet orange-flavoured cordial
                            named after the island of Curaçao. Combined with lemonade and a squeeze of lime, it delivers a
                            tropical citrus punch that tastes as spectacular as it looks.

                            First served in the 1970s, it has since become a staple on menus around the world. Its brilliant
                            blue hue and citrusy sweetness make it a showstopper at any gathering.
                        </p>

                    </div>

                </button>

                <button class="steps">

                    <h1><i class="fa-solid fa-utensils"></i> Step-by-Step Instructions</h1>

                    <div class="divider-steps"></div>

                    <div class="each-step">
                        <div class="step-number"><h2>1.</h2></div>
                        <div class="step-content">
                            <p>Chill your serving glass in the freezer for 5 minutes for the best experience.</p>
                        </div>
                    </div>

                    <div class="step-divider"></div>

                    <div class="each-step">
                        <div class="step-number"><h2>2.</h2></div>
                        <div class="step-content">
                            <p>Fill the chilled glass generously with ice cubes.</p>
                        </div>
                    </div>

                    <div class="step-divider"></div>

                    <div class="each-step">
                        <div class="step-number"><h2>3.</h2></div>
                        <div class="step-content">
                            <p>Pour the blue curacao syrup over the ice.</p>
                        </div>
                    </div>

                    <div class="step-divider"></div>

                    <div class="each-step">
                        <div class="step-number"><h2>4.</h2></div>
                        <div class="step-content">
                            <p>Add fresh lemon or lime juice for a bright citrus kick.</p>
                        </div>
                    </div>

                    <div class="step-divider"></div>

                    <div class="each-step">
                        <div class="step-number"><h2>5.</h2></div>
                        <div class="step-content">
                            <p>Top up with chilled lemonade or soda water and stir gently to combine.</p>
                        </div>
                    </div>

                    <div class="step-divider"></div>

                    <div class="each-step">
                        <div class="step-number"><h2>6.</h2></div>
                        <div class="step-content">
                            <p>Garnish with a lemon slice and a maraschino cherry. Serve immediately.</p>
                        </div>
                    </div>

                </button>

            </div>

            <div class="right-cards">

                <button class="recipe-card-ingredients">

                    <h1><i class="fa-solid fa-scroll"></i> Ingredients</h1>

                    <div class="divider-ingredients-first"></div>

                    <h3>For the Drink</h3>

                    <ul>
                        <li>Blue Curacao Syrup (30 ml)</li>
                        <li>Fresh Lemon Juice (15 ml)</li>
                        <li>Chilled Lemonade (120 ml)</li>
                        <li>Ice Cubes</li>
                    </ul>

                    <div class="divider-ingredients-second"></div>

                    <h3>Garnish</h3>

                    <ul>
                        <li>Lemon Slice</li>
                        <li>Maraschino Cherry</li>
                    </ul>

                </button>

                <button class="nutrition">

                    <div class="nutrition-header">
                        <h1>
                            <i class="fa-solid fa-heart-pulse"></i> Nutrition
                            <span class="per-serving">(per serving)</span>
                        </h1>
                    </div>

                    <div class="divider-nutrition-first"></div>

                    <div class="nutrition-row">
                        <span class="nutrition-label">Calories</span>
                        <span class="nutrition-value">110 kcal</span>
                    </div>

                    <div class="divider-nutrition"></div>

                    <div class="nutrition-row">
                        <span class="nutrition-label">Total Fat</span>
                        <span class="nutrition-value">0 g</span>
                    </div>

                    <div class="divider-nutrition"></div>

                    <div class="nutrition-row">
                        <span class="nutrition-label">Carbs</span>
                        <span class="nutrition-value">27 g</span>
                    </div>

                    <div class="divider-nutrition"></div>

                    <div class="nutrition-row">
                        <span class="nutrition-label">Sugars</span>
                        <span class="nutrition-value">24 g</span>
                    </div>

                    <div class="divider-nutrition"></div>

                    <div class="nutrition-row">
                        <span class="nutrition-label">Protein</span>
                        <span class="nutrition-value">0 g</span>
                    </div>

                    <div class="divider-nutrition"></div>

                    <div class="nutrition-row">
                        <span class="nutrition-label">Sodium</span>
                        <span class="nutrition-value">15 mg</span>
                    </div>

                    <div class="divider-nutrition"></div>

                    <div class="nutrition-row">
                        <span class="nutrition-label">Vitamin C</span>
                        <span class="nutrition-value">12 mg</span>
                    </div>

                </button>

            </div>

        </div>
    </div>

</body>
</html>
