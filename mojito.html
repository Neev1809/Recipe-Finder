<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recipe Finder – Virgin Mojito</title>
    <link rel="stylesheet" href="spanakopita.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Lato:wght@400&display=swap" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400&display=swap" rel="stylesheet">
    <style>
       
    </style>
</head>

<body>
    <nav>
        <div class="logo">
            <img src="Logo.jpeg" alt="Logo">
            <b>Recipe Finder</b>
        </div>
         <div class="SearchBox">
            <i class="fa-solid fa-magnifying-glass"></i>
            <input type="text" name="Search Bar" placeholder="Search for recipe">
        </div>

        <div class="links">
            <a href="#home">Home</a>
            <a href="#about">About</a>
            <a href="#contact">Contact</a>
            <a href="login.html">
                <img src="user.png" alt="User">
            </a>
        </div>
    </nav>

    <div class="container">
        <div class="buttons">

            <div class="left-cards">

                <button class="recipe-card-main">

                    <div class="card-top">

                        <div class="left">
                            <img src="mojito.jpg    " alt="Mashed Potato">
                        </div>

                        <div class="right">

                            <div class="header">
                                <h3>NON-ALCOHOLIC</h3>
                                <h3>VEG</h3>
                            </div>

                            <h1>Virgin Mojito</h1>

                            <div class="divider-first"></div>

                            <p>A zesty, mint-kissed cooler bursting with fresh lime and sparkling water. Ice-cold, vibrant, and impossibly refreshing!</p>

                            <div class="divider-second"></div>

                            <div class="details">

                                <div class="detail">
                                    <span class="detail-label">
                                        <i class="fa-solid fa-clock"></i> Time
                                    </span>
                                    <span class="detail-value">5 mins</span>
                                </div>

                                <div class="divider-third"></div>

                                <div class="detail">
                                    <span class="detail-label">
                                        <i class="fa-solid fa-star"></i> Rating
                                    </span>
                                    <span class="detail-value">4.9/5</span>
                                </div>

                                <div class="divider-third"></div>

                                <div class="detail">
                                    <span class="detail-label">
                                        <i class="fa-solid fa-fire"></i> Calories
                                    </span>
                                    <span class="detail-value">80 kcal</span>
                                </div>

                            </div>
                        </div>
                    </div>

                    <div class="divider-fourth"></div>

                    <div class="about-recipe">
                        <h2>About This Recipe</h2>
                        <br>
                        <div class="divider-fifth"></div>

                        <p>
                            The Virgin Mojito is a timeless classic rooted in Cuban culture, traditionally enjoyed as a
                            lively pick-me-up on hot days. Fresh mint leaves bruised with lime juice release their essential
                            oils, creating that signature refreshing aroma.

                            A splash of soda water and a handful of crushed ice bring everything together into one of the
                            world's most beloved refreshers — no bar experience required. Perfect for all ages and any occasion.
                        </p>

                    </div>

                </button>

                <button class="steps">

                    <h1><i class="fa-solid fa-utensils"></i> Step-by-Step Instructions</h1>

                    <div class="divider-steps"></div>

                    <div class="each-step">
                        <div class="step-number"><h2>1.</h2></div>
                        <div class="step-content">
                            <p>Wash the mint leaves and lime thoroughly. Cut the lime into quarters.</p>
                        </div>
                    </div>

                    <div class="step-divider"></div>

                    <div class="each-step">
                        <div class="step-number"><h2>2.</h2></div>
                        <div class="step-content">
                            <p>Place mint leaves and lime wedges into a tall glass.</p>
                        </div>
                    </div>

                    <div class="step-divider"></div>

                    <div class="each-step">
                        <div class="step-number"><h2>3.</h2></div>
                        <div class="step-content">
                            <p>Muddle gently to release the mint oils and lime juice — do not shred the leaves.</p>
                        </div>
                    </div>

                    <div class="step-divider"></div>

                    <div class="each-step">
                        <div class="step-number"><h2>4.</h2></div>
                        <div class="step-content">
                            <p>Add sugar syrup and stir to dissolve evenly.</p>
                        </div>
                    </div>

                    <div class="step-divider"></div>

                    <div class="each-step">
                        <div class="step-number"><h2>5.</h2></div>
                        <div class="step-content">
                            <p>Fill the glass with crushed ice all the way to the top.</p>
                        </div>
                    </div>

                    <div class="step-divider"></div>

                    <div class="each-step">
                        <div class="step-number"><h2>6.</h2></div>
                        <div class="step-content">
                            <p>Top with chilled sparkling water, stir gently, garnish with a mint sprig and lime wheel, and serve immediately.</p>
                        </div>
                    </div>

                </button>

            </div>

            <div class="right-cards">

                <button class="recipe-card-ingredients">

                    <h1><i class="fa-solid fa-scroll"></i> Ingredients</h1>

                    <div class="divider-ingredients-first"></div>

                    <h3>For the Drink</h3>

                    <ul>
                        <li>Fresh Mint Leaves (10–12)</li>
                        <li>1 Lime, quartered</li>
                        <li>2 tbsp Sugar Syrup</li>
                        <li>Crushed Ice</li>
                        <li>Sparkling Water (150 ml)</li>
                    </ul>

                    <div class="divider-ingredients-second"></div>

                    <h3>Garnish</h3>

                    <ul>
                        <li>Mint Sprig</li>
                        <li>Lime Wheel</li>
                    </ul>

                </button>

                <button class="nutrition">

                    <div class="nutrition-header">
                        <h1>
                            <i class="fa-solid fa-heart-pulse"></i> Nutrition
                            <span class="per-serving">(per serving)</span>
                        </h1>
                    </div>

                    <div class="divider-nutrition-first"></div>

                    <div class="nutrition-row">
                        <span class="nutrition-label">Calories</span>
                        <span class="nutrition-value">80 kcal</span>
                    </div>

                    <div class="divider-nutrition"></div>

                    <div class="nutrition-row">
                        <span class="nutrition-label">Total Fat</span>
                        <span class="nutrition-value">0 g</span>
                    </div>

                    <div class="divider-nutrition"></div>

                    <div class="nutrition-row">
                        <span class="nutrition-label">Carbs</span>
                        <span class="nutrition-value">21 g</span>
                    </div>

                    <div class="divider-nutrition"></div>

                    <div class="nutrition-row">
                        <span class="nutrition-label">Sugars</span>
                        <span class="nutrition-value">18 g</span>
                    </div>

                    <div class="divider-nutrition"></div>

                    <div class="nutrition-row">
                        <span class="nutrition-label">Protein</span>
                        <span class="nutrition-value">0.5 g</span>
                    </div>

                    <div class="divider-nutrition"></div>

                    <div class="nutrition-row">
                        <span class="nutrition-label">Sodium</span>
                        <span class="nutrition-value">10 mg</span>
                    </div>

                    <div class="divider-nutrition"></div>

                    <div class="nutrition-row">
                        <span class="nutrition-label">Vitamin C</span>
                        <span class="nutrition-value">18 mg</span>
                    </div>

                </button>

            </div>

        </div>
    </div>

</body>
</html>
