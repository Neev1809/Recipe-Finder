<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recipe Finder</title>
    <link rel="stylesheet" href="spanakopita.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Lato:wght@400&display=swap" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400&display=swap" rel="stylesheet">
</head>
<body>
    <nav>
        <div class="logo">
            <img src="Logo.jpeg" alt="Logo">
            <b>Recipe Finder</b>
        </div>
        <div class="SearchBox">
            <i class="fa-solid fa-magnifying-glass"></i>
            <input type="text" name="Search Bar" placeholder="Search for recipe">
        </div>

        <div class="links">
            <a href="#home">Home</a>
            <a href="#about">About</a>
            <a href="#contact">Contact</a>
            <a href="login.html">
                <img src="user.png" alt="User">
            </a>
        </div>
    </nav>

    <div class="container">
        <div class="buttons">
            <div class="left-cards">
                <button class="recipe-card-main">
                    <div class="card-top">
                        <div class="left">
                            <img src="brownie.webp" alt="Brownie">
                        </div>
                        <div class="right">
                            <div class="header">
                                <h3>DESSERT</h3>
                                <h3>VEG</h3>
                            </div>
                            <h1>Brownie</h1>
                            <div class="divider-first"></div>
                            <p>Fudgy chocolate brownies with a crackly top and deep cocoa flavor in every bite. Rich, dense, and utterly irresistible!</p>
                            <div class="divider-second"></div>
                            <div class="details">
                                <div class="detail">
                                    <span class="detail-label"><i class="fa-solid fa-clock" style="color: darkgreen;"></i> Time</span>
                                    <span class="detail-value">40 mins</span>
                                </div>
                                <div class="divider-third"></div>
                                <div class="detail">
                                    <span class="detail-label"><i class="fa-solid fa-star" style="color: darkgreen;"></i> Rating</span>
                                    <span class="detail-value">4.9/5</span>
                                </div>
                                <div class="divider-third"></div>
                                <div class="detail">
                                    <span class="detail-label"><i class="fa-solid fa-fire" style="color: darkgreen;"></i> Calories</span>
                                    <span class="detail-value">380 kcal</span>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="divider-fourth"></div>
                    <div class="about-recipe">
                        <h2>About This Recipe</h2>
                        <br>
                        <div class="divider-fifth"></div>
                        <p>
                            Brownies are the ultimate chocolate indulgence — dense, fudgy, and packed with rich cocoa flavour.
                            Made with melted butter, dark chocolate, sugar, eggs, and just a touch of flour, they strike the
                            perfect balance between a cake and a cookie.

                            Beloved worldwide as a go-to dessert for every occasion, brownies can be enjoyed plain, dusted with
                            powdered sugar, or topped with a scoop of vanilla ice cream. Their crackly top and gooey centre
                            make them absolutely impossible to resist.
                        </p>
                    </div>
                </button>

                <button class="steps">
                    <h1><i class="fa-solid fa-utensils"></i> Step-by-Step Instructions</h1>
                    <div class="divider-steps"></div>
                    <div class="each-step">
                        <div class="step-number"><h2>1.</h2></div>
                        <div class="step-content"><p>Preheat the oven to 175°C (350°F) and grease a square baking pan with butter or line it with parchment paper.</p></div>
                    </div>
                    <div class="step-divider"></div>
                    <div class="each-step">
                        <div class="step-number"><h2>2.</h2></div>
                        <div class="step-content"><p>Melt the butter and dark chocolate together in a heatproof bowl over simmering water (or microwave in 30-second bursts), stirring until smooth. Let cool slightly.</p></div>
                    </div>
                    <div class="step-divider"></div>
                    <div class="each-step">
                        <div class="step-number"><h2>3.</h2></div>
                        <div class="step-content"><p>Whisk sugar into the chocolate mixture, then add eggs one at a time, beating well after each addition. Stir in vanilla extract.</p></div>
                    </div>
                    <div class="step-divider"></div>
                    <div class="each-step">
                        <div class="step-number"><h2>4.</h2></div>
                        <div class="step-content"><p>Sift in flour, cocoa powder, and salt. Fold gently until just combined — do not overmix.</p></div>
                    </div>
                    <div class="step-divider"></div>
                    <div class="each-step">
                        <div class="step-number"><h2>5.</h2></div>
                        <div class="step-content"><p>Pour the batter into the prepared pan and spread evenly. Optionally fold in chocolate chips or walnuts.</p></div>
                    </div>
                    <div class="step-divider"></div>
                    <div class="each-step">
                        <div class="step-number"><h2>6.</h2></div>
                        <div class="step-content"><p>Bake for 25–30 minutes until a toothpick inserted in the centre comes out with moist crumbs. Cool completely before cutting into squares.</p></div>
                    </div>
                </button>
            </div>

            <div class="right-cards">
                <button class="recipe-card-ingredients">
                    <h1><i class="fa-solid fa-scroll"></i> Ingredients</h1>
                    <div class="divider-ingredients-first"></div>
                    <h3>For the Brownie</h3>
                    <ul>
                        <li>Dark Chocolate</li>
                        <li>Butter</li>
                        <li>Sugar</li>
                        <li>Eggs</li>
                        <li>Vanilla Extract</li>
                        <li>All-Purpose Flour</li>
                    </ul>
                    <div class="divider-ingredients-second"></div>
                    <h3>For Flavour & Texture</h3>
                    <ul>
                        <li>Cocoa Powder</li>
                        <li>Salt</li>
                        <li>Chocolate Chips (optional)</li>
                        <li>Walnuts (optional)</li>
                    </ul>
                </button>

                <button class="nutrition">
                    <div class="nutrition-header">
                        <h1><i class="fa-solid fa-heart-pulse"></i> Nutrition <span class="per-serving">(per 100g)</span></h1>
                    </div>
                    <div class="divider-nutrition-first"></div>
                    <div class="nutrition-row"><span class="nutrition-label">Calories</span><span class="nutrition-value">380 kcal</span></div>
                    <div class="divider-nutrition"></div>
                    <div class="nutrition-row"><span class="nutrition-label">Total Fat</span><span class="nutrition-value">18 g</span></div>
                    <div class="divider-nutrition"></div>
                    <div class="nutrition-row"><span class="nutrition-label">Carbs</span><span class="nutrition-value">52 g</span></div>
                    <div class="divider-nutrition"></div>
                    <div class="nutrition-row"><span class="nutrition-label">Protein</span><span class="nutrition-value">5 g</span></div>
                    <div class="divider-nutrition"></div>
                    <div class="nutrition-row"><span class="nutrition-label">Sodium</span><span class="nutrition-value">120 mg</span></div>
                    <div class="divider-nutrition"></div>
                    <div class="nutrition-row"><span class="nutrition-label">Cholesterol</span><span class="nutrition-value">75 mg</span></div>
                    <div class="divider-nutrition"></div>
                    <div class="nutrition-row"><span class="nutrition-label">Potassium</span><span class="nutrition-value">210 mg</span></div>
                </button>
            </div>
        </div>
    </div>
</body>
</html>
