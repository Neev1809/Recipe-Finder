<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recipe Finder – Classic Lemonade</title>
    <link rel="stylesheet" href="spanakopita.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Lato:wght@400&display=swap" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400&display=swap" rel="stylesheet">
    
</head>

<body>
    <nav>
        <div class="logo">
            <img src="Logo.jpg" alt="Logo">
            <b>Recipe Finder</b>
        </div>
     <div class="SearchBox">
            <i class="fa-solid fa-magnifying-glass"></i>
            <input type="text" name="Search Bar" placeholder="Search for recipe">
        </div>

        <div class="links">
            <a href="index.html">Home</a>
            <a href="#about">About</a>
            <a href="#contact">Contact</a>
            <a href="login.html">
                <img src="user.png" alt="User">
            </a>
        </div>
    </nav>

    <div class="container">
        <div class="buttons">

            <div class="left-cards">

                <button class="recipe-card-main">

                    <div class="card-top">

                        <div class="left">
                           <img src="lemonade.jpg" alt="Mashed Potato">
                        </div>

                        <div class="right">

                            <div class="header">
                                <h3>CLASSIC</h3>
                                <h3>VEG</h3>
                            </div>

                            <h1>Classic Lemonade</h1>

                            <div class="divider-first"></div>

                            <p>Bright, tart, and perfectly sweetened. Three ingredients, zero fuss — the gold standard of homemade summer drinks!</p>

                            <div class="divider-second"></div>

                            <div class="details">

                                <div class="detail">
                                    <span class="detail-label">
                                        <i class="fa-solid fa-clock"></i> Time
                                    </span>
                                    <span class="detail-value">8 mins</span>
                                </div>

                                <div class="divider-third"></div>

                                <div class="detail">
                                    <span class="detail-label">
                                        <i class="fa-solid fa-star"></i> Rating
                                    </span>
                                    <span class="detail-value">4.9/5</span>
                                </div>

                                <div class="divider-third"></div>

                                <div class="detail">
                                    <span class="detail-label">
                                        <i class="fa-solid fa-fire"></i> Calories
                                    </span>
                                    <span class="detail-value">95 kcal</span>
                                </div>

                            </div>
                        </div>
                    </div>

                    <div class="divider-fourth"></div>

                    <div class="about-recipe">
                        <h2>About This Recipe</h2>
                        <br>
                        <div class="divider-fifth"></div>

                        <p>
                            Lemonade has been quenching thirsts since at least the 13th century, when Egyptian vendors sold
                            a blend of lemon juice and sugar called qatarmizat. The secret to a great homemade lemonade is
                            the simple syrup — dissolving sugar in hot water first ensures a silky smooth texture that dry
                            sugar simply can't match.

                            Freshly squeezed lemons make all the difference. Vibrant, sunny, and universally loved, this is
                            the one drink that never goes out of style.
                        </p>

                    </div>

                </button>

                <button class="steps">

                    <h1><i class="fa-solid fa-utensils"></i> Step-by-Step Instructions</h1>

                    <div class="divider-steps"></div>

                    <div class="each-step">
                        <div class="step-number"><h2>1.</h2></div>
                        <div class="step-content">
                            <p>Make simple syrup: combine equal parts sugar and water in a small saucepan over medium heat, stir until dissolved (2–3 min). Let cool.</p>
                        </div>
                    </div>

                    <div class="step-divider"></div>

                    <div class="each-step">
                        <div class="step-number"><h2>2.</h2></div>
                        <div class="step-content">
                            <p>Roll the lemons on the counter firmly to loosen the juice inside, then cut in half.</p>
                        </div>
                    </div>

                    <div class="step-divider"></div>

                    <div class="each-step">
                        <div class="step-number"><h2>3.</h2></div>
                        <div class="step-content">
                            <p>Juice the lemons — you need about 120 ml (½ cup) of fresh lemon juice.</p>
                        </div>
                    </div>

                    <div class="step-divider"></div>

                    <div class="each-step">
                        <div class="step-number"><h2>4.</h2></div>
                        <div class="step-content">
                            <p>In a large pitcher, combine the lemon juice, cooled simple syrup, and cold water. Stir well.</p>
                        </div>
                    </div>

                    <div class="step-divider"></div>

                    <div class="each-step">
                        <div class="step-number"><h2>5.</h2></div>
                        <div class="step-content">
                            <p>Taste and adjust — add more syrup for sweetness or more lemon juice for extra tartness.</p>
                        </div>
                    </div>

                    <div class="step-divider"></div>

                    <div class="each-step">
                        <div class="step-number"><h2>6.</h2></div>
                        <div class="step-content">
                            <p>Pour over a glass full of ice, garnish with a lemon wheel and a sprig of mint, and serve.</p>
                        </div>
                    </div>

                </button>

            </div>

            <div class="right-cards">

                <button class="recipe-card-ingredients">

                    <h1><i class="fa-solid fa-scroll"></i> Ingredients</h1>

                    <div class="divider-ingredients-first"></div>

                    <h3>For the Lemonade</h3>

                    <ul>
                        <li>4–5 Fresh Lemons</li>
                        <li>Sugar (100 g)</li>
                        <li>Cold Water (600 ml)</li>
                        <li>Ice Cubes</li>
                    </ul>

                    <div class="divider-ingredients-second"></div>

                    <h3>Garnish</h3>

                    <ul>
                        <li>Lemon Wheel</li>
                        <li>Fresh Mint Sprig</li>
                    </ul>

                </button>

                <button class="nutrition">

                    <div class="nutrition-header">
                        <h1>
                            <i class="fa-solid fa-heart-pulse"></i> Nutrition
                            <span class="per-serving">(per serving)</span>
                        </h1>
                    </div>

                    <div class="divider-nutrition-first"></div>

                    <div class="nutrition-row">
                        <span class="nutrition-label">Calories</span>
                        <span class="nutrition-value">95 kcal</span>
                    </div>

                    <div class="divider-nutrition"></div>

                    <div class="nutrition-row">
                        <span class="nutrition-label">Total Fat</span>
                        <span class="nutrition-value">0 g</span>
                    </div>

                    <div class="divider-nutrition"></div>

                    <div class="nutrition-row">
                        <span class="nutrition-label">Carbs</span>
                        <span class="nutrition-value">25 g</span>
                    </div>

                    <div class="divider-nutrition"></div>

                    <div class="nutrition-row">
                        <span class="nutrition-label">Sugars</span>
                        <span class="nutrition-value">23 g</span>
                    </div>

                    <div class="divider-nutrition"></div>

                    <div class="nutrition-row">
                        <span class="nutrition-label">Protein</span>
                        <span class="nutrition-value">0.5 g</span>
                    </div>

                    <div class="divider-nutrition"></div>

                    <div class="nutrition-row">
                        <span class="nutrition-label">Sodium</span>
                        <span class="nutrition-value">5 mg</span>
                    </div>

                    <div class="divider-nutrition"></div>

                    <div class="nutrition-row">
                        <span class="nutrition-label">Vitamin C</span>
                        <span class="nutrition-value">30 mg</span>
                    </div>

                </button>

            </div>

        </div>
    </div>

</body>
</html>
