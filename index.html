<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recipe Finder</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>

    <nav>
        <a href="#home">Home</a>
        <a href="#about">About</a>
        <a href="#contact">Contact</a>
        <i class="fa-solid fa-magnifying-glass"></i>
        <input type="text" name="Search Bar" placeholder="Search for recipe">
    </nav>
    <section>
        <h1>Recipe-Finder</h1>
    </section>
    <section class="card home">

        <div class="buttons">
            <a href="#appetizers">
                <button class="btn">
                    <img src="appetizers.jpg" alt="appetizers">
                    <p>Appetizers</p>
                </button>
            </a>
            <a href="#Entrée">
                <button class="btn">
                    <img src="Eentre.jpg" alt="Entrée">
                    <p>Entrée</p>
                </button>
            </a>
            <a href="#Desserts">
                <button class="btn">
                    <img src="Desserts.jpg" alt="Desserts">
                    <p>Desserts</p>
                </button>
            </a>
            <a href="#Sides">
                <button class="btn">
                    <img src="Sides.jpg" alt="Sides">
                    <p>Side Dishes</p>
                </button>
            </a>
            <a href="#Mocktail">
                <button class="btn">
                    <img src="Mocktails.jpg" alt="Mocktails">
                    <p>Mocktails</p>
                </button>
            </a>
        </div>
    </section>
</body>

</html>
